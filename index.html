<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Emoji Overlay (TensorFlow.js)</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load TensorFlow.js and the face detection model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-detection"></script>
</head>
<body>
    <div class="container">
        <h1>Face Emoji Overlay</h1>
        <button id="startBtn" disabled>Start Camera</button>
        <div class="video-wrapper" style="display: none;">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
        <p id="status">Loading face detection model...</p>
    </div>

    <!-- Our script -->
    <script src="script.js"></script>
</body>
</html>
