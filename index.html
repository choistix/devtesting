<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Emoji Overlay (MediaPipe Tasks)</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load MediaPipe Tasks Vision (includes face detection) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <h1>Face Emoji Overlay</h1>
        <button id="startBtn">Start Camera</button>
        <div class="video-wrapper" style="display: none;">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
        <p id="status">Click "Start Camera" to begin.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
